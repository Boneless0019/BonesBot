<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SysBot Trade Portal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #111; color: #eee; padding: 2rem; max-width: 640px; margin: 0 auto; }
  h1 { font-size: 1.4rem; margin-bottom: 1.5rem; }
  section { background: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.25rem; }
  h2 { font-size: 1rem; margin-bottom: .75rem; color: #aaa; }
  .status { display: flex; align-items: center; gap: .5rem; font-size: .95rem; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #555; flex-shrink: 0; }
  .dot.online { background: #4caf50; }
  .dot.offline { background: #e05252; }
  label { display: block; font-size: .85rem; color: #aaa; margin-bottom: .3rem; }
  input, textarea { width: 100%; padding: .5rem .75rem; background: #2a2a2a; border: 1px solid #444; border-radius: 6px; color: #eee; font-size: .9rem; margin-bottom: .75rem; }
  textarea { height: 100px; resize: vertical; font-family: monospace; }
  button { padding: .5rem 1.25rem; background: #3a7bd5; border: none; border-radius: 6px; color: #fff; cursor: pointer; font-size: .9rem; }
  button:hover { background: #2f6bc0; }
  button:disabled { background: #333; color: #666; cursor: not-allowed; }
  .msg { font-size: .85rem; margin-top: .5rem; }
  .msg.ok { color: #4caf50; }
  .msg.err { color: #e05252; }
  .queue-list { list-style: none; }
  .queue-list li { padding: .4rem 0; border-bottom: 1px solid #2a2a2a; font-size: .85rem; color: #ccc; }
  .queue-list li:last-child { border: none; }
  .empty { color: #555; font-size: .85rem; }
</style>
</head>
<body>

<h1>SysBot Trade Portal</h1>

<section>
  <h2>Bot Status</h2>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="status-text">Checking...</span>
  </div>
</section>

<section>
  <h2>Submit a Trade</h2>
  <label>Showdown Set</label>
  <textarea id="set" placeholder="Paste your Showdown set here..."></textarea>
  <label>Trade Code (optional)</label>
  <input type="number" id="code" placeholder="12345678" min="0" max="99999999">
  <button id="submit-btn" onclick="submitTrade()">Request Trade</button>
  <p class="msg" id="trade-msg"></p>
</section>

<section>
  <h2>Current Queue</h2>
  <ul class="queue-list" id="queue"><li class="empty">Loading...</li></ul>
</section>

<script>
  // Point this at your SysBot proxy URL (or WebAPI directly if accessible)
  const API = 'http://localhost:5000';

  async function checkStatus() {
    try {
      const r = await fetch(`${API}/api/status`);
      const d = await r.json();
      document.getElementById('dot').className = 'dot ' + (d.online ? 'online' : 'offline');
      document.getElementById('status-text').textContent = d.online
        ? `Online — ${d.game ?? 'Unknown game'}`
        : 'Offline';
    } catch {
      document.getElementById('dot').className = 'dot offline';
      document.getElementById('status-text').textContent = 'Unreachable';
    }
  }

  async function loadQueue() {
    try {
      const r = await fetch(`${API}/api/queue`);
      const q = await r.json();
      const el = document.getElementById('queue');
      if (!q.length) { el.innerHTML = '<li class="empty">Queue is empty.</li>'; return; }
      el.innerHTML = q.map((e, i) => `<li>#${i + 1} — ${e}</li>`).join('');
    } catch {
      document.getElementById('queue').innerHTML = '<li class="empty">Could not load queue.</li>';
    }
  }

  async function submitTrade() {
    const set  = document.getElementById('set').value.trim();
    const code = document.getElementById('code').value.trim();
    const msg  = document.getElementById('trade-msg');
    const btn  = document.getElementById('submit-btn');

    if (!set) { msg.className = 'msg err'; msg.textContent = 'Showdown set is required.'; return; }

    btn.disabled = true;
    msg.textContent = '';

    try {
      const body = { set };
      if (code) body.code = parseInt(code, 10);

      const r = await fetch(`${API}/api/trade`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const d = await r.json();
      if (r.ok) {
        msg.className = 'msg ok';
        msg.textContent = d.message ?? 'Trade queued!';
        loadQueue();
      } else {
        msg.className = 'msg err';
        msg.textContent = d.error ?? 'Trade request failed.';
      }
    } catch {
      msg.className = 'msg err';
      msg.textContent = 'Could not reach the bot.';
    } finally {
      btn.disabled = false;
    }
  }

  checkStatus();
  loadQueue();
  setInterval(checkStatus, 15000);
  setInterval(loadQueue, 15000);
</script>
</body>
</html>
